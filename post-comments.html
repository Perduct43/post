<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: white;">
    <div style="display: flex; flex-wrap: wrap; gap: 20px;" id="display"></div>
</body>
<script>
    const display = document.getElementById("display")
    async function commentsfetch() {
        try {
            const theapi = await fetch("https://jsonplaceholder.typicode.com/comments");
            const thejson = await theapi.json();
            console.log("this is the json", thejson);
            display.innerHTML = thejson.map((data)=>(`
            <div style="
            background-color: black; border: none;
            border-radius: 12px; width: 440px; height: 420px;
            color: white; padding: 20px; gap: 20px;
            box-shadow: 5px 5px 5px 5px grey;">
                <h1>COMMENT ${data.id}</h1>
                <h2>name:${data.name}</h2>
                <h3>email:${data.email}</h3>
                <h4>body:${data.body}</h4>
            </div>
            `))
        } catch (error) {
            console.log("the error is", error)   
        }
    }
    commentsfetch()
</script>
</html>
