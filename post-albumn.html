<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: #F4F7F6;">
    <div style="display: flex; flex-wrap: wrap; gap: 20px;" id="display">

    </div>
</body>
<script>
    const display = document.getElementById("display")
    async function albumns() {
        try {
            const theapi = await fetch("https://jsonplaceholder.typicode.com/albums");
            const thejson = await theapi.json();
            console.log("this is the json", thejson)
            display.innerHTML = thejson.map((data)=>(`
            <div style="
            background-color: bisque; color: rgb(0, 0, 0); width: 440px;
            height: 320px; border: none; border-radius: 12px; gap: 20px; padding: 20px;
            box-shadow: 5px 5px 5px 5px rgb(205, 203, 203);">
                <h1>Id:${data.id}</h1>
                <h2>Title:${data.title}</h2>
            </div>
            `))
        } catch (error) {
            console.log("this is the error", error)
        }
    }
    albumns()
</script>
</html>
