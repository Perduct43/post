<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body style="background-color: #F4F7F6;">
    <h1 style="display: flex; justify-content: center;">
        Posts
    </h1>
    <div  id="card" style=" display: flex; flex-wrap: wrap;">

    </div>
</body>
<script>
    const display = document.getElementById("card")
        async function fetchpost() {
            try {
                const response = await fetch("https://jsonplaceholder.typicode.com/posts")
                console.log("response", response)
                const result = await response.json();
                console.log("result", result)
                display.innerHTML=result.map((item)=>(`
            <div style="width: 420px; height: 300px; background-color: white; border-radius: 12px; box-shadow: 5px 5px 5px 5px #EAEDEC; padding: 20px; margin: 20px;">
                <h1>Post#<span>${item.id}</span></h1>
                <h2>${item.title}</h2>
                <p>${item.body}</p>

            </div>`))
                
            } catch (err) {
                console.err("error is:", err.meassage)
            }
        }      

    fetchpost()
</script>

</html>
